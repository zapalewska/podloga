<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Floor - zegary rozgrywki</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050712;
        --panel: rgba(9, 20, 45, 0.88);
        --panel-strong: rgba(17, 33, 74, 0.96);
        --line: rgba(124, 229, 255, 0.34);
        --cyan: #18d8ff;
        --magenta: #bf31ff;
        --violet: #6f39ff;
        --danger: #ff3d71;
        --warning: #ffc247;
        --text: #f8fbff;
        --muted: #9fb2ce;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
        --round: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% -12%, rgba(128, 60, 255, 0.28), transparent 34rem),
          linear-gradient(135deg, #03040b 0%, #07142b 48%, #0d0823 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .stage {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
        padding: clamp(16px, 3vw, 34px);
        isolation: isolate;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
      }

      .scoreboard {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(220px, 1.1fr) minmax(0, 0.95fr);
        align-items: stretch;
        width: min(1320px, 100%);
        margin: 0 auto;
        border: 1px solid rgba(182, 98, 255, 0.68);
        box-shadow: 0 0 28px rgba(140, 45, 255, 0.42), inset 0 0 30px rgba(25, 216, 255, 0.09);
        background: linear-gradient(180deg, rgba(18, 28, 63, 0.94), rgba(9, 16, 40, 0.9));
        clip-path: polygon(2.2% 0, 97.8% 0, 100% 100%, 0 100%);
      }

      .nameplate,
      .category {
        min-width: 0;
        padding: clamp(10px, 1.35vw, 16px) clamp(14px, 2.4vw, 32px);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0;
        font-weight: 900;
        line-height: 1.08;
        overflow-wrap: anywhere;
      }

      .nameplate {
        color: #dce8ff;
        font-size: clamp(1.05rem, 2.6vw, 2.35rem);
        text-shadow: 0 0 18px rgba(24, 216, 255, 0.24);
        transition: color 160ms ease, background 160ms ease, box-shadow 160ms ease, text-shadow 160ms ease;
      }

      .nameplate.active {
        color: #ffffff;
        background: linear-gradient(180deg, rgba(24, 216, 255, 0.24), rgba(44, 97, 255, 0.2));
        box-shadow: inset 0 -4px 0 var(--cyan), inset 0 0 26px rgba(24, 216, 255, 0.16);
        text-shadow: 0 0 20px rgba(24, 216, 255, 0.56);
      }

      .category {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(184, 49, 255, 0.68), rgba(99, 32, 158, 0.8));
        border-inline: 2px solid rgba(234, 116, 255, 0.56);
        color: #fff8ff;
        font-size: clamp(0.95rem, 2.1vw, 1.95rem);
        text-shadow: 0 0 18px rgba(255, 255, 255, 0.28);
      }

      .arena {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: clamp(14px, 2vw, 26px);
        align-items: center;
        width: min(1320px, 100%);
        margin: 0 auto;
        padding-block: clamp(22px, 4vw, 48px);
      }

      .player {
        position: relative;
        min-width: 0;
        min-height: clamp(340px, 48vh, 570px);
        display: grid;
        grid-template-rows: 1fr auto;
        padding: clamp(18px, 3vw, 34px);
        overflow: hidden;
        border: 1px solid rgba(138, 172, 255, 0.24);
        background: linear-gradient(180deg, rgba(6, 16, 40, 0.93), rgba(7, 10, 29, 0.96));
        box-shadow: var(--shadow);
        cursor: pointer;
        user-select: none;
      }

      .player::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border: 4px solid transparent;
        opacity: 0;
        transition: opacity 160ms ease, border-color 160ms ease;
      }

      .player.active::after {
        border-color: var(--cyan);
        opacity: 1;
        box-shadow: inset 0 0 40px rgba(24, 216, 255, 0.18), 0 0 42px rgba(24, 216, 255, 0.28);
      }

      .player.out {
        border-color: rgba(255, 61, 113, 0.72);
      }

      .player.pass-flash {
        animation: passFlash 1000ms ease-out;
      }

      @keyframes passFlash {
        0%,
        18% {
          background: linear-gradient(180deg, rgba(255, 61, 113, 0.72), rgba(72, 8, 32, 0.96));
          border-color: rgba(255, 61, 113, 0.95);
          box-shadow: 0 0 52px rgba(255, 61, 113, 0.62), inset 0 0 36px rgba(255, 61, 113, 0.26);
        }

        100% {
          background: linear-gradient(180deg, rgba(6, 16, 40, 0.93), rgba(7, 10, 29, 0.96));
          border-color: rgba(138, 172, 255, 0.24);
          box-shadow: var(--shadow);
        }
      }

      .clock {
        display: grid;
        place-items: center;
        color: rgba(248, 251, 255, 0.96);
        font-size: clamp(7.2rem, 19vw, 18rem);
        font-weight: 1000;
        line-height: 0.88;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 32px rgba(24, 216, 255, 0.26);
      }

      .player.out .clock {
        color: var(--danger);
        text-shadow: 0 0 34px rgba(255, 61, 113, 0.34);
      }

      .meter {
        height: 14px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.11);
        background: rgba(255, 255, 255, 0.08);
      }

      .meter-fill {
        width: 100%;
        height: 100%;
        transform-origin: left center;
        background: linear-gradient(90deg, var(--cyan), #7effc6);
        box-shadow: 0 0 18px rgba(24, 216, 255, 0.7);
      }

      .player.out .meter-fill {
        background: var(--danger);
      }

      .controls {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(3, 7, 19, 0.78);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .controls.hidden {
        display: none;
      }

      .fields,
      .actions {
        display: grid;
        gap: 10px;
      }

      .fields {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      input {
        min-width: 0;
        height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: var(--round);
        padding: 0 12px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        outline: none;
      }

      input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(24, 216, 255, 0.15);
      }

      .actions {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      button {
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: var(--round);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        cursor: pointer;
        font-weight: 850;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: rgba(24, 216, 255, 0.55);
        background: rgba(24, 216, 255, 0.15);
      }

      button.primary {
        border-color: rgba(24, 216, 255, 0.65);
        background: linear-gradient(180deg, rgba(24, 216, 255, 0.42), rgba(25, 91, 175, 0.48));
      }

      button.danger {
        border-color: rgba(255, 61, 113, 0.52);
      }

      .show-controls {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 3;
        width: 48px;
        min-height: 48px;
        display: none;
        border-radius: 999px;
        background: rgba(3, 7, 19, 0.82);
      }

      .show-controls.visible {
        display: block;
      }

      @media (max-width: 840px) {
        body {
          overflow: auto;
        }

        .stage {
          min-height: 100svh;
        }

        .scoreboard,
        .arena,
        .fields,
        .actions {
          grid-template-columns: 1fr;
        }

        .scoreboard {
          clip-path: none;
        }

        .category {
          border-inline: 0;
          border-block: 1px solid rgba(234, 116, 255, 0.56);
        }

        .player {
          min-height: 270px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="scoreboard" aria-label="Uczestnicy i kategoria">
        <div class="nameplate" id="leftName">Katarzyna</div>
        <div class="category" id="categoryName">Slodycze</div>
        <div class="nameplate" id="rightName">Natalia</div>
      </section>

      <section class="arena" aria-label="Zegary uczestnikow">
        <article class="player active" id="leftPlayer">
          <div class="clock" id="leftClock">45</div>
          <div class="meter" aria-hidden="true"><div class="meter-fill" id="leftMeter"></div></div>
        </article>

        <article class="player" id="rightPlayer">
          <div class="clock" id="rightClock">45</div>
          <div class="meter" aria-hidden="true"><div class="meter-fill" id="rightMeter"></div></div>
        </article>
      </section>

      <section class="controls" id="controls" aria-label="Panel sterowania">
        <div class="fields">
          <label>
            Imie po lewej
            <input id="leftInput" value="Katarzyna" maxlength="18" autocomplete="off">
          </label>
          <label>
            Kategoria
            <input id="categoryInput" value="Slodycze" autocomplete="off">
          </label>
          <label>
            Imie po prawej
            <input id="rightInput" value="Natalia" maxlength="18" autocomplete="off">
          </label>
          <label>
            Czas rundy
            <input id="roundInput" type="number" value="45" min="5" max="999" step="1">
          </label>
        </div>

        <div class="actions">
          <button id="passButton" type="button">PASS</button>
          <button id="addButton" type="button">+5 s</button>
          <button class="danger" id="resetButton" type="button">Reset</button>
          <button id="hideButton" type="button">Ukryj panel</button>
        </div>
      </section>
    </main>

    <button class="show-controls" id="showButton" type="button" title="Pokaz panel">...</button>

    <script>
      const state = {
        active: "left",
        running: false,
        roundSeconds: 45,
        left: 45,
        right: 45,
        lastTick: null,
        raf: null
      };

      const elements = {
        leftName: document.querySelector("#leftName"),
        rightName: document.querySelector("#rightName"),
        categoryName: document.querySelector("#categoryName"),
        leftInput: document.querySelector("#leftInput"),
        rightInput: document.querySelector("#rightInput"),
        categoryInput: document.querySelector("#categoryInput"),
        roundInput: document.querySelector("#roundInput"),
        leftPlayer: document.querySelector("#leftPlayer"),
        rightPlayer: document.querySelector("#rightPlayer"),
        leftClock: document.querySelector("#leftClock"),
        rightClock: document.querySelector("#rightClock"),
        leftMeter: document.querySelector("#leftMeter"),
        rightMeter: document.querySelector("#rightMeter"),
        addButton: document.querySelector("#addButton"),
        passButton: document.querySelector("#passButton"),
        resetButton: document.querySelector("#resetButton"),
        hideButton: document.querySelector("#hideButton"),
        showButton: document.querySelector("#showButton"),
        controls: document.querySelector("#controls")
      };

      function normalizeText(value, fallback) {
        const text = value.trim();
        return text.length ? text : fallback;
      }

      function formatSeconds(value) {
        return String(Math.max(0, Math.ceil(value)));
      }

      function setActive(side) {
        state.active = side;
        state.lastTick = performance.now();
        render();
      }

      function switchSide() {
        setActive(state.active === "left" ? "right" : "left");
      }

      function setRunning(nextRunning) {
        state.running = nextRunning;
        state.lastTick = performance.now();
        if (state.running) {
          tick();
        } else if (state.raf) {
          cancelAnimationFrame(state.raf);
          state.raf = null;
        }
      }

      function resetRound() {
        setRunning(false);
        const seconds = Number(elements.roundInput.value);
        state.roundSeconds = Number.isFinite(seconds) ? Math.max(5, Math.min(999, seconds)) : 45;
        elements.roundInput.value = state.roundSeconds;
        state.left = state.roundSeconds;
        state.right = state.roundSeconds;
        state.active = "left";
        render();
      }

      function adjustActive(delta) {
        const side = state.active;
        state[side] = Math.max(0, Math.min(999, state[side] + delta));
        render();
      }

      function flashPlayer(side) {
        const player = side === "left" ? elements.leftPlayer : elements.rightPlayer;
        player.classList.remove("pass-flash");
        void player.offsetWidth;
        player.classList.add("pass-flash");
      }

      function passPlayer(side) {
        state[side] = Math.max(0, state[side] - 3);
        flashPlayer(side);
        if (state[side] <= 0 && state.active === side) {
          setRunning(false);
        }
        render();
      }

      function handlePlayerClick(side) {
        if (state.active !== side) {
          setActive(side);
          setRunning(true);
          return;
        }

        setRunning(!state.running);
      }

      function handlePlayerPass(event, side) {
        event.preventDefault();
        passPlayer(side);
      }

      function tick() {
        const now = performance.now();
        const elapsed = (now - state.lastTick) / 1000;
        state.lastTick = now;

        if (state.running) {
          state[state.active] = Math.max(0, state[state.active] - elapsed);
          if (state[state.active] <= 0) {
            setRunning(false);
          }
          render();
          state.raf = requestAnimationFrame(tick);
        }
      }

      function render() {
        elements.leftName.textContent = normalizeText(elements.leftInput.value, "Gracz 1");
        elements.rightName.textContent = normalizeText(elements.rightInput.value, "Gracz 2");
        elements.categoryName.textContent = normalizeText(elements.categoryInput.value, "Kategoria");

        elements.leftClock.textContent = formatSeconds(state.left);
        elements.rightClock.textContent = formatSeconds(state.right);

        const leftRatio = state.roundSeconds ? state.left / state.roundSeconds : 0;
        const rightRatio = state.roundSeconds ? state.right / state.roundSeconds : 0;
        elements.leftMeter.style.transform = `scaleX(${Math.max(0, Math.min(1, leftRatio))})`;
        elements.rightMeter.style.transform = `scaleX(${Math.max(0, Math.min(1, rightRatio))})`;

        elements.leftPlayer.classList.toggle("active", state.active === "left");
        elements.rightPlayer.classList.toggle("active", state.active === "right");
        elements.leftName.classList.toggle("active", state.active === "left");
        elements.rightName.classList.toggle("active", state.active === "right");
        elements.leftPlayer.classList.toggle("out", state.left <= 0);
        elements.rightPlayer.classList.toggle("out", state.right <= 0);
      }

      elements.leftInput.addEventListener("input", render);
      elements.rightInput.addEventListener("input", render);
      elements.categoryInput.addEventListener("input", render);
      elements.roundInput.addEventListener("change", resetRound);
      elements.leftPlayer.addEventListener("click", () => handlePlayerClick("left"));
      elements.rightPlayer.addEventListener("click", () => handlePlayerClick("right"));
      elements.leftPlayer.addEventListener("contextmenu", (event) => handlePlayerPass(event, "left"));
      elements.rightPlayer.addEventListener("contextmenu", (event) => handlePlayerPass(event, "right"));
      elements.addButton.addEventListener("click", () => adjustActive(5));
      elements.passButton.addEventListener("click", () => passPlayer(state.active));
      elements.resetButton.addEventListener("click", resetRound);

      elements.hideButton.addEventListener("click", () => {
        elements.controls.classList.add("hidden");
        elements.showButton.classList.add("visible");
      });

      elements.showButton.addEventListener("click", () => {
        elements.controls.classList.remove("hidden");
        elements.showButton.classList.remove("visible");
      });

      document.addEventListener("keydown", (event) => {
        const editing = ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName);
        if (editing) {
          return;
        }

        if (event.code === "Space") {
          event.preventDefault();
          setRunning(!state.running);
        }

        if (event.code === "Enter") {
          event.preventDefault();
          switchSide();
        }

        if (event.key.toLowerCase() === "r") {
          resetRound();
        }
      });

      render();
    </script>
  </body>
</html>
